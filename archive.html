<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maheswara // Archive</title>
<style>
    /* CORE VARIABLES */
    :root {
        --neon-cyan: #00ffff;
        --neon-pink: #ff4da6;
        --terminal-bg: #05080f;
        --panel-bg: rgba(0, 255, 255, 0.05);
        --font-mono: 'Consolas', 'Courier New', Courier, monospace;
    }

    /* GLOBAL STYLES */
    body, html { margin: 0; padding: 0; background-color: #000; color: var(--neon-cyan); font-family: var(--font-mono); min-height: 100vh; }

    /* CRT SCANLINE OVERLAY */
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 999; }

    .site-wrapper { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    /* NAVIGATION */
    header { border-bottom: 2px solid var(--neon-cyan); margin-bottom: 30px; padding-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-end; }
    nav ul { list-style: none; padding: 0; margin: 0; display: flex; gap: 15px; flex-wrap: wrap; }
    nav a { color: var(--neon-cyan); text-decoration: none; font-weight: bold; font-size: 1.1em; padding: 5px 10px; text-transform: uppercase; transition: all 0.2s ease; }
    nav a:hover, nav a.active { background-color: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); }
    
    /* THE RESTORED HOVER EFFECT */
    nav a::before { content: "> "; opacity: 0; }
    nav a:hover::before, nav a.active::before { opacity: 1; }
    
    /* CONTENT */
    .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
    .module { background: var(--panel-bg); border: 1px solid rgba(0,255,255,0.3); border-radius: 3px; padding: 20px; }
    .module-title { font-size: 1.2em; border-bottom: 1px dashed var(--neon-cyan); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="site-wrapper">
    <header>
        <div>
            <h1 style="margin: 0; color: #fff; text-shadow: 0 0 10px var(--neon-cyan); text-transform: uppercase; font-size: 2.5em;">Maheswara // Archive</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">cd /home</a></li>
                <li><a href="blog.html">cd /blog</a></li>
                <li><a href="archive.html" class="active">cd /archive</a></li>
                <li><a href="social.html">cd /social_media</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-grid">
        <div class="main-column">
            <div class="module">
                <div class="module-title">ARCHIVE_LOGS_2026</div>
                <ul style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 15px;">
                        <span style="color: #666;">[2026-01-12]</span> — <a href="#" style="color: var(--neon-cyan); text-decoration: none;">Legacy System Integration</a>
                    </li>
                    <li style="margin-bottom: 15px;">
                        <span style="color: #666;">[2025-11-04]</span> — <a href="#" style="color: var(--neon-cyan); text-decoration: none;">The Great Wiki Migration</a>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</div>

</body>
</html>
